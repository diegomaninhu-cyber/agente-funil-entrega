<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IA de Seguidores + Agentes de IA</title>
  <meta name="description" content="Descubra como usar IA para crescer no Instagram e vender no automatico."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sand: #FFFDF2;
      --orange: #FF4000;
      --green: #00AD03;
      --green-hover: #07b238;
      --graphite: #2B2B2B;
      --white: #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--sand);
      color: var(--graphite);
      min-height: 100vh;
    }

    /* ── BARRA DE ALERTA TOPO ── */
    .alert-banner {
      background-color: var(--orange);
      color: var(--white);
      text-align: center;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    /* ── SECAO DO VIDEO ── */
    .video-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* Player vertical 9:16 centralizado */
    .video-wrapper {
      width: 100%;
      max-width: 428px; /* Otimizado para iPhone 12 Pro Max e Desktop */
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* Container com aspect-ratio 9:16 */
    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 177.78%; /* 16/9 * 100 */
    }

    .video-container video,
    .video-container .video-placeholder {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Placeholder enquanto nao tem video */
    .video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
      gap: 20px;
      cursor: pointer;
    }

    .play-icon {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.15);
      border: 3px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .play-icon svg { margin-left: 5px; }

    .placeholder-text {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      padding: 0 20px;
      line-height: 1.5;
    }

    .placeholder-hint {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      text-align: center;
      padding: 0 20px;
    }

    /* ── CTA (aparece apos o video / botao principal) ── */
    .cta-container {
      width: 100%;
      max-width: 428px;
      margin-top: 24px;
      display: none; /* oculto por padrao, aparece via JS */
    }

    .cta-container.visible {
      display: block;
      animation: slide-up 0.4s ease-out forwards;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cta-btn {
      display: block;
      width: 100%;
      background: var(--green);
      color: var(--white);
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
      padding: 20px 24px;
      border-radius: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      animation: pulse-btn 2s ease-in-out infinite;
      transition: background 0.2s, transform 0.2s;
    }

    .cta-btn:hover {
      background: var(--green-hover);
      animation: none;
      transform: translateY(-2px);
    }

    @keyframes pulse-btn {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(0,173,3,0.4); }
      50% { transform: scale(1.02); box-shadow: 0 6px 32px rgba(0,173,3,0.6); }
    }

    /* ── MOSTRAR CTA IMEDIATAMENTE (para quando nao ha video) ── */
    .cta-always {
      display: block;
    }

    /* ── PROGRESS BAR (opcional) ── */
    .video-progress {
      width: 100%;
      max-width: 428px;
      height: 4px;
      background: rgba(0,0,0,0.08);
      margin-top: 12px;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .video-progress.visible { display: block; }

    .progress-fill {
      height: 100%;
      background: var(--orange);
      width: 0%;
      transition: width 0.5s linear;
    }

    /* ── SEGURANCA ── */
    .security-badges {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(43,43,43,0.6);
      flex-wrap: wrap;
    }

    .security-badges span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── RESPONSIVO PARA DISPOSITIVOS MENORES ── */
    @media (max-width: 480px) {
      .video-section { 
        padding: 20px 15px 40px; 
      }
      .video-wrapper { 
        max-width: 100%; 
        border-radius: 16px; 
      }
      .cta-container { 
        max-width: 100%; 
      }
      .alert-banner { 
        font-size: 12px; 
        padding: 12px;
      }
      .cta-btn { 
        font-size: 16px; 
        padding: 18px; 
      }
      .security-badges {
        gap: 12px;
        font-size: 11px;
      }
    }
    
    /* ── RESPONSIVO PARA DESKTOP E TELAS MAIORES ── */
    @media (min-width: 768px) {
      .video-section {
        padding: 60px 20px 80px;
      }
      .video-wrapper {
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- BARRA DE URGENCIA TOPO -->
  <div class="alert-banner">
    ATENCAO! ESSE VIDEO SAIRA DO AR A QUALQUER MOMENTO!
  </div>

  <!-- SECAO PRINCIPAL -->
  <main class="video-section">

    <!-- PLAYER DE VIDEO -->
    <div class="video-wrapper" id="videoWrapper">
      <div class="video-container">

        <!--
          INSTRUCOES PARA ADICIONAR SEU VIDEO:
          ====================================
          Quando tiver o video pronto, substitua a div .video-placeholder
          por uma tag <video> com seu arquivo hospedado:

          <video
            id="mainVideo"
            playsinline
            controls
            preload="metadata"
            poster="thumbnail.jpg"
          >
            <source src="/videos/oferta.mp4" type="video/mp4"/>
          </video>

          O JavaScript abaixo ja esta configurado para:
          - Rastrear o progresso do video
          - Mostrar o botao CTA no tempo que voce definir (var CTA_TRIGGER_SECONDS)
          - Manter o botao visivel ao final
        -->

        <video
          id="mainVideo"
          playsinline
          controls
          preload="metadata"
        >
          <source src="WhatsApp Video 2026-07-20 at 05.37.27.mp4" type="video/mp4"/>
        </video>

      </div>
    </div>

    <!-- BARRA DE PROGRESSO DO VIDEO -->
    <div class="video-progress" id="videoProgress">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- BOTAO CTA (aparece no momento certo) -->
    <div class="cta-container" id="ctaContainer">
      <a
        href="https://checkout.infinitepay.io/ag12-sendz?lenc=G0oBIIzEOEZycUSJtenvp8ASn_-MBWVaVeluwFk80J0vgz7hLXf68syvcPi_tfZbmEUtSSMJAw30AVugbv67x0Rq1D9l9Wk1POzhUr351QT-DhMcT5MCSdO8wBJhppUXirlm9wB9ukTTBIlQ8d4-cd3MT_fiyn268ycZXYM8_elbL4GfIIPADOj0wKsXS46dHr0XQMDlcdpdvoLmMemzTr_UDljTOyjYjHKzcasd-BJu1gp_1iQVb2RJIqlmKVtAfviWjiJgGtqsoIqNcbRSObaTsUy5nJ9u9xHQMgY.v1.91f3ac5decb42c8d"
        class="cta-btn"
        id="ctaBtn"
        target="_blank"
      >
        QUERO MEU ACESSO AGORA — R$ 49,90
      </a>

      <div class="security-badges">
        <span>🔒 Pagamento seguro</span>
        <span>💳 Cartao ou PIX</span>
        <span>⚡ Acesso imediato</span>
      </div>
    </div>

  </main>

  <script>
    // ─────────────────────────────────────────────────────
    // CONFIGURACAO
    // ─────────────────────────────────────────────────────
    // Quantos segundos do video antes de mostrar o botao CTA
    // Ajuste esse valor quando tiver o video (ex: 300 = 5 minutos)
    var CTA_TRIGGER_SECONDS = 225; // 3m45s

    // ─────────────────────────────────────────────────────
    var ctaContainer = document.getElementById('ctaContainer');
    var videoProgress = document.getElementById('videoProgress');
    var progressFill = document.getElementById('progressFill');
    var video = document.getElementById('mainVideo');

    function showCTA() {
      ctaContainer.classList.add('visible');
    }

    if (video) {
      // Tem video: escuta o progresso
      videoProgress.classList.add('visible');

      video.addEventListener('timeupdate', function() {
        var pct = (video.currentTime / video.duration) * 100;
        progressFill.style.width = pct + '%';

        if (video.currentTime >= CTA_TRIGGER_SECONDS && CTA_TRIGGER_SECONDS > 0) {
          showCTA();
        }
      });

      video.addEventListener('ended', function() {
        showCTA();
        progressFill.style.width = '100%';
      });

    } else {
      // Sem video: mostra CTA imediatamente
      showCTA();
    }
  </script>

</body>
</html>
